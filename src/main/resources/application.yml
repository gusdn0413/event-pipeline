spring:
  application:
    name: event-pipeline
  datasource:
    url: jdbc:postgresql://localhost:5432/eventdb
    username: postgres
    password: root1234
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 메시지 브로커 선택: nats / spring-event
messaging:
  broker: nats

nats:
  url: nats://localhost:4222
  subject: events.api.call
  jetstream:
    stream: EVENTS
    consumer: api-log-consumer
    # 30일 보관은 TimescaleDB 책임. NATS는 DB 일시 장애 흡수용 짧은 버퍼만 유지
    max-age-seconds: 3600
    # bulk flush(1초) + DB write 여유 + 재시도 마진
    ack-wait-seconds: 30
    # poison message 무한 재배달 방지
    max-deliver: 5

event:
  generator:
    enabled: true
    interval-ms: 500
    weights:
      success: 70
      client-error: 15
      server-error: 5
      slow: 10
