# Grafana 영속 디스크
# 대시보드 설정·사용자 정보·플러그인 등 Grafana 데이터를 저장
# Pod가 재시작되어도 같은 디스크에 다시 마운트되어 설정 유지
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
spec:
  accessModes: ["ReadWriteOnce"]   # 한 노드에서 한 Pod만 마운트 (Grafana 1대 운영)
  resources:
    requests:
      storage: 1Gi                 # 대시보드 설정만 담으므로 작게
