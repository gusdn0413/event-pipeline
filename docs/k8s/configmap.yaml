# 앱이 참조할 환경 설정값을 모아둔 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: event-pipeline-config

data:
  NATS_URL: "nats://nats-service:4222"
  # DB는 K8s 밖 외부 호스트(예: AWS EC2의 TimescaleDB)로 가정
  # 실제 배포 시 host 부분을 환경별 DB 주소로 교체
  SPRING_DATASOURCE_URL: "jdbc:postgresql://EXTERNAL_DB_HOST:5432/eventdb"
  SPRING_DATASOURCE_USERNAME: "postgres"
  MESSAGING_BROKER: "nats"
  TZ: "Asia/Seoul"
